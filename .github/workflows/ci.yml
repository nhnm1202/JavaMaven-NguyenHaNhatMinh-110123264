name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lay code tu GitHub
        uses: actions/checkout@v4

      - name: Cai dat JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build va Test voi Maven
        run: |
          cd JavaMaven-NguyenHaNhatMinh-110123264
          mvn clean test
